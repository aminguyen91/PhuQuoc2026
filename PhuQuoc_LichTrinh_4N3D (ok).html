  .page { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; }

  /* HEADER */
  .header { background: #1a6b5a; padding: 14px 16px 12px; text-align: center; }
  .header h1 { color: #fff; font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .header p { color: #9FE1CB; font-size: 12px; }

  /* MAP CONTAINER */
  .map-wrap { position: relative; background: #c8e6f5; overflow: hidden; }
  .map-wrap svg { display: block; width: 100%; height: auto; touch-action: none; }

  /* INFO PANEL */
  .info-panel { display: none; background: #fff; border-top: 3px solid #1a6b5a; padding: 14px 16px 16px; }
  .info-panel.show { display: block; }
  .panel-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .day-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; display: inline-block; }
  .close-btn { font-size: 22px; color: #999; cursor: pointer; line-height: 1; padding: 0 4px; }
  .place-name { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
  .place-desc { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 10px; }
  .place-dist { font-size: 12px; color: #1a6b5a; background: #e8f4f0; padding: 8px 12px; border-radius: 8px; font-weight: 500; }

  /* LEGEND */
  .legend { padding: 12px 14px; background: #fff; border-top: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 8px; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  /* FOOTER */
  .footer { background: #1a6b5a; text-align: center; padding: 10px; font-size: 11px; color: #9FE1CB; }
</style>

var panel = document.getElementById("infopanel");
var ipDay = document.getElementById("ip-day");
var ipName = document.getElementById("ip-name");
var ipDesc = document.getElementById("ip-desc");
var ipDist = document.getElementById("ip-dist");

function showInfo(id) {
  var d = pinData[id];
  if (!d) return;
  ipDay.textContent = d.day;
  ipDay.style.background = d.dayBg;
  ipDay.style.color = d.dayColor;
  ipName.textContent = d.name;
  ipDesc.textContent = d.desc;
  ipDist.textContent = d.dist;
  panel.classList.add("show");
  setTimeout(function() {
    panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }, 50);
}

document.querySelectorAll("[id^='p-']").forEach(function(el) {
  el.addEventListener("click", function(e) {
    e.stopPropagation();
    showInfo(el.id);
  });
  el.addEventListener("touchend", function(e) {
    e.preventDefault();
    e.stopPropagation();
    showInfo(el.id);
  }, { passive: false });
});

document.getElementById("closeBtn").addEventListener("click", function() {
  panel.classList.remove("show");
});
document.getElementById("closeBtn").addEventListener("touchend", function(e) {
  e.preventDefault();
  panel.classList.remove("show");
}, { passive: false });
</script>
